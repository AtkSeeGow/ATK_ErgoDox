<layout>
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header">
          <h5 class="card-category">概述</h5>
          <h3 class="card-title">ATK_ErgoDox(分離式人體工學鍵盤)</h3>
        </div>
        <div class="card-body">
          <div class="typography-line">
            <p>
              身為一個軟體工程師，CTRL+C(複製)、CTRL+V(貼上)是我常用的組合鍵，常常一整天下來，小拇指因為彆扭的姿勢導致痠痛，這個專案除了更多的使用大拇指外，也透過組合鍵的方式將一些像是"確認鍵"、"退格鍵"等常用右手功能，移至左手，使右手離開滑鼠的頻率減少。
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
